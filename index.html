<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小星星電話亭 - 中文數字練習</title>
    <style>
        :root {
            --phone-bg: #333333;
            --screen-bg: #E0F7FA;
            --btn-number: #FFFFFF;
            --btn-delete: #FFAB91;
            --btn-call: #81C784;
            --text-main: #37474F;
            --accent-pink: #FF80AB;
        }

        body {
            font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* 手機外殼 */
        #phone-case {
            width: 340px;
            background-color: var(--phone-bg);
            border-radius: 50px;
            padding: 15px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4), inset 0 0 10px rgba(255,255,255,0.2);
            border: 6px solid #444;
            position: relative;
        }

        /* 頂部瀏海 */
        #notch {
            width: 150px;
            height: 25px;
            background: #444;
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            z-index: 5;
        }

        /* 螢幕顯示區 */
        #screen {
            background-color: var(--screen-bg);
            border-radius: 35px;
            height: 240px;
            margin-top: 10px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
            border: 4px solid #b2ebf2;
        }

        #role-icon {
            font-size: 4.5rem;
            margin-bottom: 10px;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.1));
        }

        .target-box {
            background: rgba(255,255,255,0.6);
            padding: 8px 15px;
            border-radius: 15px;
            text-align: center;
        }

        .ruby-text {
            display: inline-block;
            text-align: center;
            margin: 0 3px;
        }
        .ruby-main { display: block; font-size: 1.1rem; font-weight: bold; color: var(--text-main); }
        .ruby-sub { display: block; font-size: 0.65rem; color: #78909C; }

        #target-number {
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: 3px;
            color: var(--accent-pink);
            margin-top: 5px;
            text-shadow: 1px 1px 0 white;
        }

        #dialed-display {
            font-size: 1.8rem;
            color: #263238;
            min-height: 2.2rem;
            margin-top: 15px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* 按鍵區 */
        #keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            padding: 10px;
        }

        .key {
            background-color: var(--btn-number);
            border-radius: 20px;
            height: 75px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 6px 0 #CFD8DC;
            user-select: none;
        }

        .key:active {
            transform: scale(0.92) translateY(4px);
            box-shadow: 0 2px 0 #CFD8DC;
        }

        .key .hanzi { font-size: 1.7rem; font-weight: bold; color: #455A64; }
        .key .pinyin-zhuyin { font-size: 0.7rem; color: #90A4AE; line-height: 1.1; }

        .key.action { color: white; font-size: 2.2rem; }
        #key-delete { background-color: var(--btn-delete); box-shadow: 0 6px 0 #E64A19; }
        #key-call { background-color: var(--btn-call); box-shadow: 0 6px 0 #388E3C; }

        /* 遊戲結束覆蓋層 */
        #overlay {
            position: absolute;
            top: 15px; left: 15px; right: 15px; bottom: 15px;
            background: rgba(255,255,255,0.96);
            border-radius: 35px;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            animation: fadeIn 0.4s;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #status-text { font-size: 1.4rem; font-weight: bold; margin-bottom: 30px; line-height: 1.6; color: var(--text-main); }

        #retry-btn {
            width: 80px;
            height: 80px;
            font-size: 2.5rem;
            background-color: #64B5F6;
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            box-shadow: 0 6px 0 #1E88E5;
            display: none; /* 初始隱藏 */
            align-items: center;
            justify-content: center;
        }
        
        #retry-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #1E88E5; }
    </style>
</head>
<body>

<div id="phone-case">
    <div id="notch"></div>
    <div id="screen">
        <div id="role-icon">👤</div>
        <div class="target-box">
            <div class="ruby-text"><span class="ruby-main">打</span><span class="ruby-sub">dǎ/ㄉㄚˇ</span></div>
            <div class="ruby-text"><span class="ruby-main">給</span><span class="ruby-sub">gěi/ㄍㄟˇ</span></div>
            <span id="target-name-container"></span>
            <div id="target-number">00000000</div>
        </div>
        <div id="dialed-display"></div>
    </div>

    <div id="keypad"></div>

    <div id="overlay">
        <div id="status-text">...</div>
        <button id="retry-btn" onclick="startGame()">🔄</button>
    </div>
</div>
