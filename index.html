<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小星星電話亭 - 中文數字練習</title>
    <style>
        :root {
            --phone-bg: #333333;
            --screen-bg: #E0F7FA;
            --btn-number: #FFFFFF;
            --btn-delete: #FFAB91;
            --btn-call: #81C784;
            --text-main: #37474F;
            --accent-pink: #FF80AB;
        }

        body {
            font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* 確保背景填滿 */
            margin: 0;
            padding: 20px; /* 增加邊距防止貼邊 */
            box-sizing: border-box;
            touch-action: manipulation;
        }

        /* 縮放容器：解決螢幕太小顯示不全的問題 */
        #scale-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            transform-origin: center center;
        }

        #phone-case {
            width: 320px; /* 稍微縮小寬度 */
            background-color: var(--phone-bg);
            border-radius: 45px;
            padding: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            border: 5px solid #444;
            position: relative;
        }

        #notch {
            width: 130px; height: 20px; background: #444;
            position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
            border-bottom-left-radius: 18px; border-bottom-right-radius: 18px;
            z-index: 5;
        }

        #screen {
            background-color: var(--screen-bg);
            border-radius: 32px;
            height: 230px;
            margin-top: 5px;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
            box-sizing: border-box;
            border: 3px solid #b2ebf2;
        }

        #role-icon { font-size: 4rem; margin-bottom: 5px; }

        .target-box {
            background: rgba(255,255,255,0.7);
            padding: 8px;
            border-radius: 18px;
            text-align: center;
            width: 100%;
        }

        .ruby-text { display: inline-block; text-align: center; margin: 0 2px; vertical-align: bottom; }
        .ruby-main { display: block; font-size: 1.1rem; font-weight: bold; color: var(--text-main); }
        .ruby-sub { display: block; font-size: 0.65rem; color: #78909C; line-height: 1.2; }

        #target-number {
            font-size: 1.9rem;
            font-weight: 900;
            letter-spacing: 2px;
            color: var(--accent-pink);
            margin-top: 5px;
        }

        #dialed-display {
            font-size: 1.6rem;
            color: #263238;
            min-height: 2rem;
            margin-top: 8px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        #keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 5px;
        }

        .key {
            background-color: var(--btn-number);
            border-radius: 18px;
            height: 70px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 0 5px 0 #CFD8DC;
            user-select: none;
        }

        .key:active { transform: translateY(3px); box-shadow: 0 2px 0 #CFD8DC; }

        .key .hanzi { font-size: 1.5rem; font-weight: bold; color: #455A64; }
        .key .pinyin-zhuyin { font-size: 0.6rem; color: #90A4AE; text-align: center; }

        .key.action { color: white; font-size: 2rem; }
        #key-delete { background-color: var(--btn-delete); box-shadow: 0 5px 0 #E64A19; }
        #key-call { background-color: var(--btn-call); box-shadow: 0 5px 0 #388E3C; }

        #overlay {
            position: absolute;
            top: 12px; left: 12px; right: 12px; bottom: 12px;
            background: rgba(255,255,255,0.97);
            border-radius: 32px;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            padding: 20px;
            text-align: center;
        }

        #status-text { font-size: 1.3rem; font-weight: bold; margin-bottom: 25px; color: var(--text-main); white-space: pre-wrap; }

        #retry-btn {
            width: 80px; height: 80px; font-size: 2.8rem;
            background-color: #64B5F6; border: none; border-radius: 50%;
            color: white; cursor: pointer; box-shadow: 0 6px 0 #1E88E5;
            display: none; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

<div id="scale-wrapper">
    <div id="phone-case">
        <div id="notch"></div>
        <div id="screen">
            <div id="role-icon">👤</div>
            <div class="target-box">
                <div class="ruby-text"><span class="ruby-main">打</span><span class="ruby-sub">dǎ/ㄉㄚˇ</span></div>
                <div class="ruby-text"><span class="ruby-main">給</span><span class="ruby-sub">gěi/ㄍㄟˇ</span></div>
                <span id="target-name-container"></span>
                <div id="target-number">00000000</div>
            </div>
            <div id="dialed-display"></div>
        </div>
        <div id="keypad"></div>
        <div id="overlay">
            <div id="status-text"></div>
            <button id="retry-btn" onclick="startGame()">🔄</button>
        </div>
    </div>
</div>

<script>
    const characters = [
        {h: '零', p: 'líng', z: 'ㄌㄧㄥˊ', v: 0},
        {h: '一', p: 'yī', z: 'ㄧ', v: 1},
        {h: '二', p: 'èr', z: 'ㄦˋ', v: 2},
        {h: '三', p: 'sān', z: 'ㄙㄢ', v: 3},
        {h: '四', p: 'sì', z: 'ㄙˋ', v: 4},
        {h: '五', p: 'wǔ', z: 'ㄨˇ', v: 5},
        {h: '六', p: 'liù', z: 'ㄌㄧㄡˋ', v: 6},
        {h: '七', p: 'qī', z: 'ㄑㄧ', v: 7},
        {h: '八', p: 'bā', z: 'ㄅㄚ', v: 8},
        {h: '九', p: 'jiǔ', z: 'ㄐㄧㄡˇ', v: 9}
    ];

    const roles = [
        {name: "爸爸", p: "bàba", z: "ㄅㄚˋ˙ㄅㄚ", icon: "👨‍💼"},
        {name: "媽媽", p: "māma", z: "ㄇㄚㄇㄚ", icon: "👩‍🍳"},
        {name: "老師", p: "lǎoshī", z: "ㄌㄠˇㄕ", icon: "👩‍🏫"},
        {name: "奶奶", p: "nǎinai", z: "ㄋㄞˇㄋㄞ", icon: "👵"},
        {name: "警察", p: "jǐngchá", z: "ㄐㄧㄥˇㄔㄚˊ", icon: "👮"}
    ];

    let targetNum = "";
    let currentInput = "";
    let audioCtx = null;

    // 自動縮放邏輯
    function adjustScale() {
        const wrapper = document.getElementById('scale-wrapper');
        const phone = document.getElementById('phone-case');
        const padding = 40;
        const scale = Math.min(
            window.innerWidth / (phone.offsetWidth + padding),
            window.innerHeight / (phone.offsetHeight + padding),
            1 // 最高不超過 100%
        );
        wrapper.style.transform = `scale(${scale})`;
    }

    window.addEventListener('resize', adjustScale);

    function startGame() {
        currentInput = "";
        document.getElementById('dialed-display').innerText = "";
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('retry-btn').style.display = 'none';
        
        const role = roles[Math.floor(Math.random() * roles.length)];
        const len = Math.random() > 0.5 ? 8 : 10;
        targetNum = "";
        for(let i=0; i<len; i++) targetNum += Math.floor(Math.random()*10);

        document.getElementById('role-icon').innerText = role.icon;
        document.getElementById('target-name-container').innerHTML = `
            <div class="ruby-text"><span class="ruby-main">${role.name}</span><span class="ruby-sub">${role.p}/${role.z}</span></div>
        `;
        document.getElementById('target-number').innerText = targetNum;

        renderKeypad();
        setTimeout(adjustScale, 50); // 渲染後調整一次比例
    }

    function renderKeypad() {
        const keypad = document.getElementById('keypad');
        keypad.innerHTML = "";
        let shuffledChars = [...characters].sort(() => Math.random() - 0.5);
        
        for(let i=0; i<9; i++) {
            keypad.appendChild(createKeyElement(shuffledChars[i]));
        }

        keypad.appendChild(createActionButton("←", "key-delete", () => {
            currentInput = currentInput.slice(0, -1);
            document.getElementById('dialed-display').innerText = currentInput;
        }));

        keypad.appendChild(createKeyElement(shuffledChars[9]));

        keypad.appendChild(createActionButton("📞", "key-call", handleCall));
    }

    function createKeyElement(char) {
        const div = document.createElement('div');
        div.className = 'key';
        div.innerHTML = `<span class="hanzi">${char.h}</span>
                         <span class="pinyin-zhuyin">${char.z}<br>${char.p}</span>`;
        div.onclick = () => {
            if(currentInput.length < 12) {
                currentInput += char.v;
                document.getElementById('dialed-display').innerText = currentInput;
                speak(char.h);
            }
        };
        return div;
    }

    function createActionButton(content, id, callback) {
        const div = document.createElement('div');
        div.className = 'key action';
        div.id = id;
        div.innerHTML = content;
        div.onclick = callback;
        return div;
    }

    function speak(text, callback) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'zh-TW';
        msg.rate = 0.9;
        
        let called = false;
        msg.onend = () => {
            if(!called && callback) { called = true; callback(); }
        };
        if(callback) setTimeout(() => { if(!called) { called = true; callback(); } }, 3000);

        window.speechSynthesis.speak(msg);
    }

    function playBeep() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = 400;
        gain.gain.setValueAtTime(0, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + 0.1);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.7);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.8);
    }

    function handleCall() {
        if(currentInput === "") return;
        const overlay = document.getElementById('overlay');
        const statusText = document.getElementById('status-text');
        overlay.style.display = 'flex';
        statusText.innerText = "撥號中...\n嘟... 嘟...";

        let count = 0;
        const interval = setInterval(() => {
            playBeep();
            count++;
            if(count >= 3) {
                clearInterval(interval);
                const isSuccess = (currentInput === targetNum);
                if(isSuccess) {
                    statusText.innerHTML = "成功通話！\n「喂，你好！」\n✨ 😊 ✨";
                    speak("喂，你好", () => {
                        document.getElementById('retry-btn').style.display = 'flex';
                    });
                } else {
                    statusText.innerHTML = "打不通...\n「號碼是空號」\n❌ 😵 ❌";
                    speak("您撥的號碼是空號", () => {
                        document.getElementById('retry-btn').style.display = 'flex';
                    });
                }
            }
        }, 1200);
    }

    startGame();
</script>

</body>
</html>
