<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CALL ME PLZ! - 8-Bit Adventure (Special Edition)</title>
    <style>
        :root {
            --pixel-black: #212121;
            --pixel-white: #ffffff;
            --bg-sky: #a2d2ff;
            --phone-case: #4a4e69;
            --accent-red: #d90429;
            --bubble-friend: #e9e9eb;
            --bubble-me: #34c759;
        }

        .case-black { --phone-case: #333533; }
        .case-pink { --phone-case: #ffafcc; }
        .case-green { --phone-case: #b7e4c7; }
        .case-yellow { --phone-case: #fee440; }

        * { box-sizing: border-box; font-family: "Microsoft JhengHei", sans-serif; font-weight: bold; }

        body {
            background-color: var(--bg-sky);
            background-image: radial-gradient(var(--pixel-white) 15%, transparent 15%);
            background-size: 30px 30px;
            margin: 0; display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        #phone-body {
            width: 350px; height: 92vh; max-height: 750px;
            background: var(--phone-case); border: 8px solid var(--pixel-black);
            border-radius: 55px; position: relative; padding: 12px; display: flex; flex-direction: column;
            box-shadow: 12px 12px 0 rgba(0,0,0,0.2);
        }

        #screen {
            flex: 1; background: #f8f9fa; border: 6px solid var(--pixel-black);
            border-radius: 35px; overflow: hidden; position: relative; display: flex; flex-direction: column;
        }

        .scene {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; text-align: center;
        }
        .active { display: flex; }

        /* 警報閃爍動畫 */
        @keyframes emergency-blink {
            0% { background-color: #ff4d4d; }
            50% { background-color: #4d4dff; }
            100% { background-color: #ff4d4d; }
        }
        .emergency-mode { animation: emergency-blink 0.4s infinite; color: white !important; }

        .logo { font-size: 2.8rem; color: #ff9f1c; text-shadow: 4px 4px 0 var(--pixel-black); margin-bottom: 30px; }
        
        .btn-pixel {
            background: var(--pixel-white); border: 4px solid var(--pixel-black);
            box-shadow: 5px 5px 0 var(--pixel-black); padding: 12px 30px; font-size: 1.5rem;
            cursor: pointer; margin: 10px; transition: 0.1s;
        }
        .btn-pixel:active { transform: translate(3px, 3px); box-shadow: 2px 2px 0 var(--pixel-black); }

        .color-row { display: flex; gap: 15px; margin: 20px 0; }
        .color-opt { width: 45px; height: 45px; border-radius: 50%; border: 4px solid var(--pixel-black); cursor: pointer; }

        #chat-container { 
            width: 100%; display: flex; flex-direction: column; gap: 12px; padding: 10px; 
            justify-content: center; height: 70%; 
        }
        .msg {
            padding: 10px 15px; border-radius: 18px; max-width: 85%; font-size: 1.2rem;
            opacity: 0; transform: translateY(15px); transition: 0.4s all; border: 3px solid var(--pixel-black);
        }
        .msg.friend { background: var(--bubble-friend); align-self: flex-start; }
        .msg.me { background: var(--bubble-me); color: white; align-self: flex-end; }
        .msg.show { opacity: 1; transform: translateY(0); }

        #chat-options { display: none; gap: 10px; margin-top: 10px; z-index: 10; }

        #nav-bar {
            width: 100%; height: 60px; padding: 10px 15px;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.05); border-bottom: 3px solid var(--pixel-black);
        }

        #target-num-display { font-size: 2.6rem; color: var(--accent-red); letter-spacing: 4px; margin: 5px 0; }

        #keypad {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 12px; width: 100%; padding: 15px; background: #eee;
        }
        .digit-key {
            background: white; border: 4px solid var(--pixel-black); border-radius: 15px;
            height: 65px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 4px 4px 0 var(--pixel-black);
        }
        .digit-key:active { transform: translate(3px, 3px); box-shadow: 1px 1px 0 var(--pixel-black); }

        #medal-modal {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.98); z-index: 200;
            display: none; flex-direction: column; align-items: center; padding: 20px;
        }
        .medal-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 100%; }
        .medal-slot { opacity: 0.2; filter: grayscale(1); transition: 0.3s; text-align: center; }
        .medal-slot.active { opacity: 1; filter: grayscale(0); }
    </style>
</head>
<body class="case-black">

<div id="game-wrapper">
    <div id="phone-body">
        <div id="screen">
            
            <div id="sc-home" class="scene active">
                <div class="logo">CALL ME PLZ!</div>
                <button class="btn-pixel" onclick="goSetup()">START</button>
            </div>

            <div id="sc-setup" class="scene">
                <p style="font-size: 1.4rem;">你的名字：</p>
                <input type="text" id="in-name" style="width: 85%; padding: 12px; border: 4px solid #000; text-align: center; font-size: 1.2rem;" placeholder="小玩家">
                <p style="font-size: 1.4rem; margin-top:20px;">顏色</p>
                <div class="color-row">
                    <div class="color-opt" style="background:#333" onclick="setCase('black')"></div>
                    <div class="color-opt" style="background:#ffafcc" onclick="setCase('pink')"></div>
                    <div class="color-opt" style="background:#b7e4c7" onclick="setCase('green')"></div>
                    <div class="color-opt" style="background:#fee440" onclick="setCase('yellow')"></div>
                </div>
                <button class="btn-pixel" onclick="goStory()">GO</button>
            </div>

            <div id="sc-story" class="scene">
                <div id="chat-container"></div>
                <div id="chat-options">
                    <button class="btn-pixel" style="font-size: 1.1rem;" onclick="reply('ok')">好啊</button>
                    <button class="btn-pixel" style="font-size: 1.1rem; background: #ddd;" onclick="reply('no')">不要</button>
                </div>
            </div>

            <div id="sc-main" class="scene" style="justify-content: flex-start; padding: 0;">
                <div id="nav-bar">
                    <div id="ui-hearts" style="color:var(--accent-red); font-size: 1.4rem;">❤️❤️❤️</div>
                    <div style="font-size: 1.8rem; cursor:pointer;" onclick="openMedals()">🏆</div>
                    <div style="font-size: 1.5rem; cursor:pointer;" onclick="resetGame()">🚪</div>
                </div>
                <div id="role-icon" style="font-size: 4.5rem; margin-top: 10px;">👤</div>
                <div id="ui-target-name" style="font-size: 1.4rem; margin: 5px 0;">打給...</div>
                <div id="target-num-display">--------</div>
                <div id="dial-input-area" style="font-size: 1.8rem; margin: 10px 0; border-bottom: 4px dashed #ccc; width: 90%; min-height: 2.5rem;"></div>
                <div id="keypad"></div>
            </div>

            <div id="sc-calling" class="scene" style="background:#212121; color:white;">
                <div style="font-size: 5rem;">📞</div><h2 style="letter-spacing:2px;">撥號中...</h2>
            </div>

            <div id="sc-result" class="scene">
                <div id="res-icon" style="font-size: 5rem;"></div>
                <h1 id="res-title" style="margin:10px 0;"></h1>
                <p id="res-msg" style="font-size: 1.4rem;"></p>
                <button id="res-btn" class="btn-pixel" onclick="startGame()">NEXT</button>
                <button id="fail-btn" class="btn-pixel" style="display:none;" onclick="resetGame()">回首頁</button>
            </div>

            <div id="medal-modal">
                <h2 style="font-size: 1.8rem;">🏆 收集冊</h2>
                <div class="medal-grid" id="ui-medal-grid"></div>
                <button class="btn-pixel" onclick="closeMedals()">關閉</button>
            </div>

        </div>
    </div>
</div>

<script>
    const roles = [
        { id: 0, n: "警察局", i: "👮", num: "110", zy: "ㄐㄧㄥˇ ㄔㄚˊ ㄐㄩˊ", type: "emergency" },
        { id: 1, n: "消防局", i: "👨‍🚒", num: "119", zy: "ㄒㄧㄠ ㄈㄤˊ ㄐㄩˊ", type: "emergency" },
        { id: 2, n: "爸爸", i: "👨‍💼", zy: "ㄅㄚˋ ㄅㄚ˙" },
        { id: 3, n: "媽媽", i: "👩‍🍳", zy: "ㄇㄚ ㄇㄚ" },
        { id: 4, n: "老師", i: "👩‍🏫", zy: "ㄌㄠˇ ㄕ" },
        { id: 5, n: "奶奶", i: "👵", zy: "ㄋㄞˇ ㄋㄞˇ" },
        { id: 6, n: "爺爺", i: "👴", zy: "ㄧㄝˊ ㄧㄝ˙" },
        { id: 7, n: "哥哥", i: "👦", zy: "ㄍㄜ ㄍㄜ" },
        { id: 8, n: "姐姐", i: "👧", zy: "ㄐㄧㄝˇ ㄐㄧㄝ˙" },
        { id: 9, n: "弟弟", i: "👶", zy: "ㄉㄧˋ ㄉㄧˋ" },
        { id: 10, n: "妹妹", i: "🧒", zy: "ㄇㄟˋ ㄇㄟˋ" },
        { id: 11, n: "小花", i: "🌸", zy: "ㄒㄧㄠˇ ㄏㄨㄚ" },
        { id: 12, n: "大文", i: "📘", zy: "ㄉㄚˋ ㄨㄣˊ" }
    ];
    const numsData = [
        {zh: '零', v: 0, z: 'ㄌㄧㄥˊ'}, {zh: '一', v: 1, z: 'ㄧ'},
        {zh: '二', v: 2, z: 'ㄦˋ'}, {zh: '三', v: 3, z: 'ㄙㄢ'},
        {zh: '四', v: 4, z: 'ㄙˋ'}, {zh: '五', v: 5, z: 'ㄨˇ'},
        {zh: '六', v: 6, z: 'ㄌㄧㄡˋ'}, {zh: '七', v: 7, z: 'ㄑㄧ'},
        {zh: '八', v: 8, z: 'ㄅㄚ'}, {zh: '九', v: 9, z: 'ㄐㄧㄡˇ'}
    ];

    let state = { name: "玩家", lives: 3, collected: new Set(), target: null, targetNum: "", input: "", bgmRunning: false };
    let audioCtx;

    // --- 音長變化 BGM 樂譜 ---
    const score = [
        { f: 523, d: 200 }, { f: 523, d: 200 }, { f: 587, d: 400 }, { f: 659, d: 400 }, { f: 523, d: 400 }, 
        { f: 659, d: 200 }, { f: 587, d: 600 }, { f: 392, d: 800 }, 
        { f: 440, d: 200 }, { f: 392, d: 200 }, { f: 440, d: 200 }, { f: 523, d: 400 }, { f: 587, d: 800 }
    ];
    let noteIdx = 0;

    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

    function playNextNote() {
        if (!state.bgmRunning || audioCtx.state !== 'running') return;
        const note = score[noteIdx % score.length];
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(note.f, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.02, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + (note.d / 1000));
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + (note.d / 1000));
        noteIdx++;
        setTimeout(playNextNote, note.d);
    }

    // --- 特殊音效：警報聲 ---
    function playSiren() {
        const sirenLength = 2.0;
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(440, now);
        osc.frequency.linearRampToValueAtTime(880, now + 0.5);
        osc.frequency.linearRampToValueAtTime(440, now + 1.0);
        osc.frequency.linearRampToValueAtTime(880, now + 1.5);
        osc.frequency.linearRampToValueAtTime(440, now + 2.0);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + sirenLength);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(now + sirenLength);
    }

    // --- 對話與遊戲核心 ---
    function goStory() {
        state.name = document.getElementById('in-name').value || "玩家";
        switchScene('sc-story');
        const chat = document.getElementById('chat-container');
        chat.innerHTML = "";
        const lines = [`${state.name}！救命啊！😱`, "我忘記帶手機了...", "請幫我打電話"];
        lines.forEach((l, i) => {
            setTimeout(() => {
                const b = document.createElement('div');
                b.className = 'msg friend'; b.innerText = l;
                chat.appendChild(b);
                setTimeout(() => b.classList.add('show'), 50);
                if(i === lines.length-1) document.getElementById('chat-options').style.display = 'flex';
            }, i * 1200);
        });
    }

    function reply(type) {
        const chat = document.getElementById('chat-container');
        const b = document.createElement('div');
        b.className = 'msg me';
        if(type === 'ok') {
            b.innerText = "好啊！沒問題"; chat.appendChild(b);
            setTimeout(() => b.classList.add('show'), 50);
            setTimeout(startGame, 1000);
        } else {
            b.innerText = "我有事，不要。"; chat.appendChild(b);
            setTimeout(() => b.classList.add('show'), 50);
            setTimeout(resetGame, 1000);
        }
        document.getElementById('chat-options').style.display = 'none';
    }

    function switchScene(id) {
        document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
        const scene = document.getElementById(id);
        scene.classList.add('active');
        scene.classList.remove('emergency-mode'); // 預設移除閃爍
    }

    function startGame() {
        state.input = ""; document.getElementById('dial-input-area').innerText = "";
        let pool = roles.filter(r => !state.collected.has(r.id));
        if (pool.length === 0) pool = roles;
        state.target = pool[Math.floor(Math.random() * pool.length)];
        state.targetNum = state.target.num || Array.from({length: 10}, () => Math.floor(Math.random()*10)).join("");
        document.getElementById('ui-target-name').innerText = `打給：${state.target.n} (${state.target.zy})`;
        document.getElementById('role-icon').innerText = state.target.i;
        document.getElementById('target-num-display').innerText = state.targetNum;
        renderKeypad(); updateUI(); switchScene('sc-main');
    }

    function renderKeypad() {
        const pad = document.getElementById('keypad'); pad.innerHTML = "";
        let shuffled = [...numsData].sort(() => Math.random() - 0.5);
        shuffled.slice(0, 9).forEach(n => pad.appendChild(makeKey(n)));
        pad.appendChild(makeAction("←", "#ffab91", () => { state.input = state.input.slice(0, -1); document.getElementById('dial-input-area').innerText = state.input; }));
        pad.appendChild(makeKey(shuffled[9]));
        pad.appendChild(makeAction("📞", "#8ac926", handleCall));
    }

    function makeKey(n) {
        const d = document.createElement('div'); d.className = 'digit-key';
        d.innerHTML = `<span style="font-size:1.6rem">${n.zh}</span><span style="font-size:0.6rem; color:#777">${n.z}</span>`;
        d.onclick = () => { if(state.input.length < 12) { state.input += n.v; document.getElementById('dial-input-area').innerText = state.input; speak(n.zh); } };
        return d;
    }

    function makeAction(t, b, c) {
        const d = document.createElement('div'); d.className = 'digit-key'; d.style.background = b;
        d.innerHTML = `<span style="font-size:1.6rem; color:white">${t}</span>`; d.onclick = c;
        return d;
    }

    function handleCall() {
        if(!state.input) return;
        audioCtx.suspend(); switchScene('sc-calling');
        let count = 0;
        const timer = setInterval(() => { playBeep(440, 0.5); count++; if(count >= 3) { clearInterval(timer); showResult(); } }, 1000);
    }

    function showResult() {
        const win = state.input === state.targetNum;
        const resultScene = document.getElementById('sc-result');
        switchScene('sc-result');
        const icon = document.getElementById('res-icon');
        const title = document.getElementById('res-title');
        const msg = document.getElementById('res-msg');

        if(win) {
            icon.innerText = "🎉"; title.innerText = "成功通話！"; 
            state.collected.add(state.target.id);
            
            // 🚨 彩蛋檢查：緊急號碼
            if(state.target.type === "emergency") {
                resultScene.classList.add('emergency-mode');
                playSiren();
                msg.innerText = `這是緊急專線 ${state.target.num}！`;
                speak(`${state.target.n}你好，需要什麼幫助嗎？`, () => setTimeout(openMedals, 1000));
            } else {
                msg.innerText = "「喂，你好！」";
                speak("喂，你好", () => setTimeout(openMedals, 500));
            }
            
            document.getElementById('res-btn').style.display = "block"; document.getElementById('fail-btn').style.display = "none";
        } else {
            icon.innerText = "😵"; title.innerText = "打錯了！"; msg.innerText = "您撥的號碼是空號";
            state.lives--; speak("您撥的號碼是空號");
            if(state.lives <= 0) { title.innerText = "遊戲結束"; document.getElementById('res-btn').style.display = "none"; document.getElementById('fail-btn').style.display = "block"; }
            else { document.getElementById('res-btn').style.display = "block"; document.getElementById('fail-btn').style.display = "none"; }
        }
        updateUI(); audioCtx.resume();
    }

    function goSetup() { 
        initAudio(); 
        if(!state.bgmRunning) { state.bgmRunning = true; playNextNote(); }
        switchScene('sc-setup'); 
    }
    function setCase(c) { document.body.className = `case-${c}`; }
    function updateUI() { document.getElementById('ui-hearts').innerText = "❤️".repeat(state.lives); }
    function openMedals() {
        const grid = document.getElementById('ui-medal-grid'); grid.innerHTML = "";
        roles.forEach(r => {
            const slot = document.createElement('div'); slot.className = `medal-slot ${state.collected.has(r.id) ? 'active' : ''}`;
            slot.innerHTML = `<div style="font-size:2.5rem">${r.i}</div><div style="font-size:0.8rem">${r.n}</div>`;
            grid.appendChild(slot);
        });
        document.getElementById('medal-modal').style.display = 'flex';
    }
    function closeMedals() { document.getElementById('medal-modal').style.display = 'none'; }
    function resetGame() { state.lives = 3; state.collected.clear(); switchScene('sc-home'); }
    function speak(t, cb) { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang = 'zh-TW'; if(cb) u.onend = cb; window.speechSynthesis.speak(u); }
    function playBeep(f, d) { const o = audioCtx.createOscillator(); const g = audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination); o.frequency.value = f; g.gain.setValueAtTime(0.1, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d); o.start(); o.stop(audioCtx.currentTime + d); }
</script>
</body>
</html>
