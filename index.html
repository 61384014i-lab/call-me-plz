<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小小接線生 - 中文數字練習</title>
    <style>
        :root {
            --primary-color: #FF6B6B;
            --secondary-color: #4ECDC4;
            --accent-color: #FFE66D;
            --bg-color: #F7FFF7;
            --key-bg: #FFFFFF;
        }

        body {
            font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            touch-action: manipulation;
        }

        #phone-container {
            width: 350px;
            background-color: #333;
            border-radius: 40px;
            padding: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            border: 8px solid #444;
            position: relative;
        }

        /* 螢幕顯示區 */
        #screen {
            background-color: var(--accent-color);
            border-radius: 20px;
            height: 220px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            text-align: center;
        }

        #role-icon {
            font-size: 4rem; /* 放大人物圖示 */
            margin-bottom: 5px;
        }

        #target-info {
            font-size: 1rem;
            color: #333;
        }

        .ruby-text {
            display: inline-block;
            text-align: center;
            margin: 0 2px;
        }
        .ruby-main { display: block; font-size: 1.2rem; font-weight: bold; }
        .ruby-sub { display: block; font-size: 0.7rem; color: #555; }

        #target-number {
            font-size: 2.2rem;
            font-weight: bold;
            letter-spacing: 2px;
            color: #222;
            margin-top: 5px;
        }

        #dialed-display {
            font-size: 1.8rem;
            color: var(--primary-color);
            min-height: 2.2rem;
            margin-top: 10px;
            font-weight: bold;
            background: rgba(255,255,255,0.5);
            width: 90%;
            border-radius: 10px;
        }

        /* 按鍵區 */
        #keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .key {
            background-color: var(--key-bg);
            border-radius: 15px;
            height: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.1s;
            box-shadow: 0 4px 0 #ddd;
            user-select: none;
        }

        .key:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #ddd;
        }

        .key .hanzi { font-size: 1.6rem; font-weight: bold; }
        .key .pinyin-zhuyin { font-size: 0.7rem; color: #666; margin-top: 2px; }

        .key.action { color: white; font-size: 2rem; }
        #key-delete { background-color: #FF9F43; }
        #key-call { background-color: #2ECC71; }

        /* 覆蓋層 */
        #overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.95);
            border-radius: 35px;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            text-align: center;
            padding: 20px;
        }

        #status-text { font-size: 1.5rem; margin-bottom: 20px; color: #333; }

        button#retry-btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            background-color: var(--secondary-color);
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 0 #3bb4ac;
        }
    </style>
</head>
<body>

<div id="phone-container">
    <div id="screen">
        <div id="role-icon">👤</div>
        <div id="target-info">
            <div class="ruby-text"><span class="ruby-main">打</span><span class="ruby-sub">dǎ/ㄉㄚˇ</span></div>
            <div class="ruby-text"><span class="ruby-main">給</span><span class="ruby-sub">gěi/ㄍㄟˇ</span></div>
            <span id="target-name-container"></span>
        </div>
        <div id="target-number">0000000</div>
        <div id="dialed-display"></div>
    </div>

    <div id="keypad"></div>

    <div id="overlay">
        <h2 id="status-text">...</h2>
        <button id="retry-btn" onclick="startGame()">再一次 (Zài yī cì)</button>
    </div>
</div>

<script>
    const characters = [
        {h: '零', p: 'líng', z: 'ㄌㄧㄥˊ', v: 0},
        {h: '一', p: 'yī', z: 'ㄧ', v: 1},
        {h: '二', p: 'èr', z: 'ㄦˋ', v: 2},
        {h: '三', p: 'sān', z: 'ㄙㄢ', v: 3},
        {h: '四', p: 'sì', z: 'ㄙˋ', v: 4},
        {h: '五', p: 'wǔ', z: 'ㄨˇ', v: 5},
        {h: '六', p: 'liù', z: 'ㄌㄧㄡˋ', v: 6},
        {h: '七', p: 'qī', z: 'ㄑㄧ', v: 7},
        {h: '八', p: 'bā', z: 'ㄅㄚ', v: 8},
        {h: '九', p: 'jiǔ', z: 'ㄐㄧㄡˇ', v: 9}
    ];

    const roles = [
        {name: "爸爸", p: "bàba", z: "ㄅㄚˋ˙ㄅㄚ", icon: "👨‍💼"},
        {name: "媽媽", p: "māma", z: "ㄇㄚㄇㄚ", icon: "👩‍🍳"},
        {name: "老師", p: "lǎoshī", z: "ㄌㄠˇㄕ", icon: "👩‍🏫"},
        {name: "奶奶", p: "nǎinai", z: "ㄋㄞˇㄋㄞ", icon: "👵"},
        {name: "警察", p: "jǐngchá", z: "ㄐㄧㄥˇㄔㄚˊ", icon: "👮"},
        {name: "醫生", p: "yīshēng", z: "ㄧㄕㄥ", icon: "👨‍⚕️"}
    ];

    let targetNum = "";
    let currentInput = "";
    let audioCtx = null;

    function startGame() {
        currentInput = "";
        document.getElementById('dialed-display').innerText = "";
        document.getElementById('overlay').style.display = 'none';
        
        const role = roles[Math.floor(Math.random() * roles.length)];
        const len = Math.floor(Math.random() * 4) + 7;
        targetNum = "";
        for(let i=0; i<len; i++) targetNum += Math.floor(Math.random()*10);

        document.getElementById('role-icon').innerText = role.icon;
        document.getElementById('target-name-container').innerHTML = `
            <div class="ruby-text"><span class="ruby-main">${role.name}</span><span class="ruby-sub">${role.p}/${role.z}</span></div>
        `;
        document.getElementById('target-number').innerText = targetNum;

        renderKeypad();
    }

    function renderKeypad() {
        const keypad = document.getElementById('keypad');
        keypad.innerHTML = "";

        // 0-9 全部參與隨機排列
        let allNumbers = [...characters].sort(() => Math.random() - 0.5);

        // 前 9 個放進格子
        for(let i=0; i<9; i++) {
            keypad.appendChild(createKeyElement(allNumbers[i]));
        }

        // 最後一列：刪除(←) | 第10個隨機數字 | 通話(📞)
        keypad.appendChild(createActionButton("←", "key-delete", () => {
            currentInput = currentInput.slice(0, -1);
            document.getElementById('dialed-display').innerText = currentInput;
        }));
        
        keypad.appendChild(createKeyElement(allNumbers[9]));

        keypad.appendChild(createActionButton("📞", "key-call", handleCall));
    }

    function createKeyElement(char) {
        const div = document.createElement('div');
        div.className = 'key';
        div.innerHTML = `<span class="hanzi">${char.h}</span>
                         <span class="pinyin-zhuyin">${char.z}<br>${char.p}</span>`;
        div.onclick = () => {
            if(currentInput.length < 12) {
                currentInput += char.v;
                document.getElementById('dialed-display').innerText = currentInput;
                speak(char.h);
            }
        };
        return div;
    }

    function createActionButton(content, id, callback) {
        const div = document.createElement('div');
        div.className = 'key action';
        div.id = id;
        div.innerHTML = `<span class="hanzi">${content}</span>`;
        div.onclick = callback;
        return div;
    }

    function speak(text) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'zh-TW';
        msg.rate = 0.8; 
        window.speechSynthesis.speak(msg);
    }

    // 模擬撥號嘟嘟聲
    function playBeep(duration) {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(440, audioCtx.currentTime); 
        osc.frequency.exponentialRampToValueAtTime(480, audioCtx.currentTime + duration);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    function handleCall() {
        if(currentInput === "") return;
        
        const overlay = document.getElementById('overlay');
        const statusText = document.getElementById('status-text');
        overlay.style.display = 'flex';
        statusText.innerText = "撥號中...";

        // 撥號循環音 (嘟... 嘟...)
        let count = 0;
        const beepInterval = setInterval(() => {
            playBeep(0.8);
            count++;
            if(count >= 3) {
                clearInterval(beepInterval);
                checkResult();
            }
        }, 1200);

        function checkResult() {
            if(currentInput === targetNum) {
                speak("喂，你好");
                statusText.innerHTML = "成功！<br>「喂，你好！」<br>(Wèi, nǐ hǎo)";
            } else {
                speak("您撥的號碼是空號");
                statusText.innerHTML = "失敗！<br>「您撥的號碼是空號。」<br>(Kōng hào)";
            }
        }
    }

    startGame();
</script>

</body>
</html>
