<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小小接線生 - 中文數字練習</title>
    <style>
        :root {
            --primary-color: #FF6B6B;
            --secondary-color: #4ECDC4;
            --accent-color: #FFE66D;
            --bg-color: #F7FFF7;
            --key-bg: #FFFFFF;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #phone-container {
            width: 350px;
            background-color: #333;
            border-radius: 40px;
            padding: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            border: 8px solid #444;
            position: relative;
        }

        /* 螢幕顯示區 */
        #screen {
            background-color: var(--accent-color);
            border-radius: 20px;
            height: 180px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            text-align: center;
        }

        #target-info {
            font-size: 1.2rem;
            margin-bottom: 5px;
            color: #333;
        }

        #target-number {
            font-size: 2rem;
            font-weight: bold;
            letter-spacing: 2px;
            color: #222;
        }

        #dialed-display {
            font-size: 1.8rem;
            color: var(--primary-color);
            min-height: 2.2rem;
            margin-top: 10px;
            font-weight: bold;
        }

        /* 按鍵區 */
        #keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .key {
            background-color: var(--key-bg);
            border-radius: 15px;
            height: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            box-shadow: 0 4px 0 #ddd;
        }

        .key:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #ddd;
        }

        .key .hanzi { font-size: 1.6rem; font-weight: bold; }
        .key .pinyin-zhuyin { font-size: 0.7rem; color: #666; }

        .key.action { color: white; }
        #key-delete { background-color: #FF9F43; }
        #key-call { background-color: #2ECC71; }

        /* 覆蓋層 (遊戲結束) */
        #overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.9);
            border-radius: 35px;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        button#retry-btn {
            padding: 15px 30px;
            font-size: 1.2rem;
            background-color: var(--secondary-color);
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="phone-container">
    <div id="screen">
        <div id="target-info">請撥號給 <span id="target-name">...</span></div>
        <div id="target-number">0000000</div>
        <div id="dialed-display"></div>
    </div>

    <div id="keypad">
        </div>

    <div id="overlay">
        <h2 id="status-text">喂，你好！</h2>
        <button id="retry-btn" onclick="startGame()">再一次</button>
    </div>
</div>

<script>
    const characters = [
        {h: '零', p: 'líng', z: 'ㄌㄧㄥˊ', v: 0},
        {h: '一', p: 'yī', z: 'ㄧ', v: 1},
        {h: '二', p: 'èr', z: 'ㄦˋ', v: 2},
        {h: '三', p: 'sān', z: 'ㄙㄢ', v: 3},
        {h: '四', p: 'sì', z: 'ㄙˋ', v: 4},
        {h: '五', p: 'wǔ', z: 'ㄨˇ', v: 5},
        {h: '六', p: 'liù', z: 'ㄌㄧㄡˋ', v: 6},
        {h: '七', p: 'qī', z: 'ㄑㄧ', v: 7},
        {h: '八', p: 'bā', z: 'ㄅㄚ', v: 8},
        {h: '九', p: 'jiǔ', z: 'ㄐㄧㄡˇ', v: 9}
    ];

    const roles = [
        {name: "爸爸 👨‍💼"}, {name: "媽媽 👩‍🍳"}, {name: "老師 👩‍🏫"}, 
        {name: "奶奶 👵"}, {name: "警察局 👮"}, {name: "消防隊 👨‍🚒"}
    ];

    let targetNum = "";
    let currentInput = "";

    function startGame() {
        currentInput = "";
        document.getElementById('dialed-display').innerText = "";
        document.getElementById('overlay').style.display = 'none';
        
        // 隨機角色與號碼 (7-10位)
        const role = roles[Math.floor(Math.random() * roles.length)];
        const len = Math.floor(Math.random() * 4) + 7;
        targetNum = "";
        for(let i=0; i<len; i++) targetNum += Math.floor(Math.random()*10);

        document.getElementById('target-name').innerText = role.name;
        document.getElementById('target-number').innerText = targetNum;

        renderKeypad();
    }

    function renderKeypad() {
        const keypad = document.getElementById('keypad');
        keypad.innerHTML = "";

        // 洗牌數字 (0-9)
        let nums = [...characters].sort(() => Math.random() - 0.5);
        
        // 為了佈局美觀，我們將數字拆解填入 3x4 網格
        // 最後一列固定：刪除 | 0 | 撥打
        const zeroIndex = nums.findIndex(n => n.v === 0);
        const zeroChar = nums.splice(zeroIndex, 1)[0];

        nums.forEach(char => {
            keypad.appendChild(createKeyElement(char));
        });

        // 加入底層按鍵
        keypad.appendChild(createActionButton("重填", "key-delete", () => {
            currentInput = "";
            document.getElementById('dialed-display').innerText = "";
        }));
        
        keypad.appendChild(createKeyElement(zeroChar));

        keypad.appendChild(createActionButton("通話", "key-call", handleCall));
    }

    function createKeyElement(char) {
        const div = document.createElement('div');
        div.className = 'key';
        div.innerHTML = `<span class="hanzi">${char.h}</span>
                         <span class="pinyin-zhuyin">${char.z} ${char.p}</span>`;
        div.onclick = () => {
            if(currentInput.length < 12) {
                currentInput += char.v;
                document.getElementById('dialed-display').innerText = currentInput;
                speak(char.h);
            }
        };
        return div;
    }

    function createActionButton(text, id, callback) {
        const div = document.createElement('div');
        div.className = 'key action';
        div.id = id;
        div.innerHTML = `<span class="hanzi">${text}</span>`;
        div.onclick = callback;
        return div;
    }

    function speak(text) {
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'zh-TW';
        window.speechSynthesis.speak(msg);
    }

    function handleCall() {
        if(currentInput === "") return;
        
        const overlay = document.getElementById('overlay');
        const statusText = document.getElementById('status-text');
        overlay.style.display = 'flex';
        statusText.innerText = "撥號中...嘟...嘟...";

        setTimeout(() => {
            if(currentInput === targetNum) {
                speak("喂，你好！");
                statusText.innerText = "成功接通！\n「喂，你好！」";
            } else {
                speak("您撥的號碼是空號。");
                statusText.innerText = "失敗！\n「您撥的號碼是空號。」";
            }
        }, 2000);
    }

    // 初始化遊戲
    startGame();
</script>

</body>
</html>
