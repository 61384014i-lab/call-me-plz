<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小小接線生 8-Bit Adventure</title>
    <style>
        /* 載入像素風格字體 (備援) */
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');

        :root {
            --pixel-black: #212121;
            --pixel-white: #ffffff;
            --bg-color: #a2d2ff;
            --phone-color: #4a4e69;
            --accent: #ff006e;
            --screen-bg: #caf0f8;
        }

        /* 手機殼配色 */
        .case-black { --phone-color: #3d3d3d; --accent: #00b4d8; }
        .case-pink { --phone-color: #ffafcc; --accent: #fb6f92; }
        .case-green { --phone-color: #b7e4c7; --accent: #52b788; }
        .case-yellow { --phone-color: #ffee93; --accent: #f9a825; }

        * { box-sizing: border-box; font-family: 'ZCOOL KuaiLe', cursive, sans-serif; }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(var(--pixel-white) 10%, transparent 10%);
            background-size: 20px 20px;
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; width: 100vw; overflow: hidden;
            touch-action: manipulation;
        }

        /* 遊戲主容器：自適應縮放 */
        #game-container {
            position: relative;
            display: flex; justify-content: center; align-items: center;
            width: 100%; height: 100%;
            max-height: 95vh;
        }

        /* 精緻手機外殼 */
        #phone-shell {
            width: 340px;
            height: 90vh;
            max-height: 700px;
            background: var(--phone-color);
            border: 8px solid var(--pixel-black);
            border-radius: 50px;
            position: relative;
            box-shadow: 15px 15px 0 rgba(0,0,0,0.2);
            display: flex; flex-direction: column; align-items: center;
            padding: 15px;
            transition: all 0.3s;
        }

        /* 手機裝飾細節 */
        #phone-shell::after {
            content: ''; position: absolute; top: 20px; width: 60px; height: 6px;
            background: var(--pixel-black); border-radius: 10px;
        }

        /* 螢幕區域 */
        #screen {
            width: 100%; height: 100%;
            background: var(--screen-bg);
            border: 6px solid var(--pixel-black);
            border-radius: 30px;
            overflow: hidden;
            display: flex; flex-direction: column;
            position: relative;
        }

        /* 介面層級 */
        .scene {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; text-align: center;
        }
        .active { display: flex; }

        /* 8-bit 按鈕風格 */
        .pixel-btn {
            background: var(--pixel-white);
            border: 4px solid var(--pixel-black);
            box-shadow: 4px 4px 0 var(--pixel-black);
            padding: 10px 20px;
            font-size: 1.2rem;
            cursor: pointer;
            margin: 10px;
            transition: all 0.1s;
        }
        .pixel-btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 var(--pixel-black); }

        /* 初始畫面樣式 */
        #start-scene { background: #bde0fe; }
        .logo-box { font-size: 2.5rem; color: var(--accent); text-shadow: 4px 4px 0 #fff; margin-bottom: 20px; }

        /* 置中設定卡 */
        .config-card { width: 100%; display: flex; flex-direction: column; align-items: center; }
        .color-picker { display: flex; gap: 10px; margin: 15px 0; }
        .color-dot { width: 40px; height: 40px; border: 3px solid #000; border-radius: 50%; cursor: pointer; }

        /* 頂部功能條 */
        #status-bar {
            width: 100%; padding: 10px 15px;
            display: flex; justify-content: space-between; align-items: center;
            position: absolute; top: 0; left: 0; z-index: 50;
        }
        .heart-life { font-size: 1.2rem; }
        .exit-btn { font-size: 1.5rem; cursor: pointer; }

        /* 獎盃大按鈕 */
        #trophy-btn {
            position: absolute; bottom: 20px; right: -20px;
            width: 70px; height: 70px; background: #ffd700;
            border: 5px solid var(--pixel-black); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; cursor: pointer; z-index: 60;
            box-shadow: 4px 4px 0 var(--pixel-black);
        }

        /* 遊戲內容 */
        #role-icon { font-size: 4rem; margin-top: 20px; filter: drop-shadow(4px 4px 0 rgba(0,0,0,0.1)); }
        .role-name-box { margin: 10px 0; background: rgba(255,255,255,0.5); padding: 5px 15px; border-radius: 10px; }
        #target-number { font-size: 1.8rem; font-weight: bold; color: var(--accent); letter-spacing: 2px; }
        #dial-display { font-size: 1.6rem; height: 2rem; margin-top: 10px; color: #333; font-weight: bold; border-bottom: 3px dashed #999; width: 80%; }

        /* 撥號鍵盤 */
        #keypad {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 8px; width: 100%; padding: 15px; background: rgba(0,0,0,0.05);
        }
        .key {
            background: white; border: 3px solid var(--pixel-black); border-radius: 12px;
            height: 60px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 3px 3px 0 var(--pixel-black);
        }
        .key:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 var(--pixel-black); }
        .key-zh { font-size: 1.4rem; font-weight: bold; }
        .key-py { font-size: 0.6rem; color: #666; }

        /* 收集冊 */
        #collection-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--screen-bg); z-index: 100; display: none; padding: 20px;
        }
        .medal-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; overflow-y: auto; height: 80%; }
        .medal { opacity: 0.2; filter: grayscale(1); display: flex; flex-direction: column; align-items: center; font-size: 0.7rem; }
        .medal.won { opacity: 1; filter: grayscale(0); }

        /* 撥號效果 */
        #calling-scene { background: #333; color: white; }
        .dot-animation::after { content: '...'; animation: dots 1.5s infinite; }
        @keyframes dots { 0%, 20% { content: '.'; } 40% { content: '..'; } 60%, 100% { content: '...'; } }

        /* 注音標記 */
        .ruby { display: inline-flex; flex-direction: column; align-items: center; line-height: 1; margin: 0 2px; }
        .rt { font-size: 0.6rem; color: #555; margin-bottom: 2px; }
    </style>
</head>
<body class="case-black">

<div id="game-container">
    <div id="phone-shell">
        <div id="screen">
            
            <div id="start-scene" class="scene active">
                <div class="logo-box">📞小小接線生</div>
                <button class="pixel-btn" onclick="showConfig()">START</button>
            </div>

            <div id="config-scene" class="scene">
                <div class="config-card">
                    <p>你的名字:</p>
                    <input type="text" id="player-name" style="width: 80%; padding: 8px; border: 3px solid #000;" placeholder="小玩家">
                    <p>選擇手機顏色:</p>
                    <div class="color-picker">
                        <div class="color-dot" style="background:#3d3d3d" onclick="setShell('black')"></div>
                        <div class="color-dot" style="background:#ffafcc" onclick="setShell('pink')"></div>
                        <div class="color-dot" style="background:#b7e4c7" onclick="setShell('green')"></div>
                        <div class="color-dot" style="background:#ffee93" onclick="setShell('yellow')"></div>
                    </div>
                    <button class="pixel-btn" onclick="startStory()">確定!</button>
                </div>
            </div>

            <div id="story-scene" class="scene" style="background: white;">
                <p id="story-text" style="line-height: 1.6; padding: 20px;"></p>
                <button class="pixel-btn" onclick="initGame()">沒問題!</button>
            </div>

            <div id="main-scene" class="scene">
                <div id="status-bar">
                    <div id="life-box" class="heart-life">❤️❤️❤️</div>
                    <div class="exit-btn" onclick="resetGame()">✖️</div>
                </div>
                <div id="role-icon">👤</div>
                <div class="role-name-box" id="target-info"></div>
                <div id="target-number">--------</div>
                <div id="dial-display"></div>
                
                <div id="keypad"></div>
                <div id="trophy-btn" onclick="toggleCollection()">🏆</div>
            </div>

            <div id="calling-scene" class="scene">
                <div style="font-size: 5rem;">📞</div>
                <h2 class="dot-animation">撥號中</h2>
            </div>

            <div id="result-scene" class="scene">
                <div id="result-icon" style="font-size: 5rem;"></div>
                <h2 id="result-msg"></h2>
                <button id="next-btn" class="pixel-btn" onclick="initGame()">下一題</button>
                <button id="retry-btn" class="pixel-btn" onclick="resetGame()" style="display:none">回首頁</button>
            </div>

            <div id="collection-overlay">
                <h3>🏆 角色收集冊</h3>
                <div class="medal-grid" id="medal-list"></div>
                <button class="pixel-btn" onclick="toggleCollection()">關閉</button>
            </div>

        </div>
    </div>
</div>

<script>
    // --- 資料定義 ---
    const roles = [
        { id: 0, n: "警察局", i: "👮", num: "110", py: "jǐng chájú", zy: "ㄐㄧㄥˇ ㄔㄚˊㄐㄩˊ" },
        { id: 1, n: "消防局", i: "👨‍🚒", num: "119", py: "xiāo fángjú", zy: "ㄒㄧㄠ ㄈㄤˊㄐㄩˊ" },
        { id: 2, n: "爸爸", i: "👨‍💼", py: "bà ba", zy: "ㄅㄚˋ ㄅㄚ˙" },
        { id: 3, n: "媽媽", i: "👩‍🍳", py: "mā ma", zy: "ㄇㄚ ㄇㄚ" },
        { id: 4, n: "老師", i: "👩‍🏫", py: "lǎo shī", zy: "ㄌㄠˇ ㄕ" },
        { id: 5, n: "奶奶", i: "👵", py: "nǎi nai", zy: "ㄋㄞˇ ㄋㄞˇ" },
        { id: 6, n: "爺爺", i: "👴", py: "yé ye", zy: "ㄧㄝˊ ㄧㄝ˙" },
        { id: 7, n: "哥哥", i: "👦", py: "gē ge", zy: "ㄍㄜ ㄍㄜ" },
        { id: 8, n: "姐姐", i: "👧", py: "jiě jie", zy: "ㄐㄧㄝˇ ㄐㄧㄝ˙" },
        { id: 9, n: "弟弟", i: "👶", py: "dì di", zy: "ㄉㄧˋ ㄉㄧˋ" },
        { id: 10, n: "妹妹", i: "🧒", py: "mèi mei", zy: "ㄇㄟˋ ㄇㄟˋ" },
        { id: 11, n: "小花", i: "🌸", py: "Xiǎohuā", zy: "ㄒㄧㄠˇ ㄏㄨㄚ" },
        { id: 12, n: "大文", i: "📘", py: "Dàwén", zy: "ㄉㄚˋ ㄨㄣˊ" }
    ];

    const numsChar = [
        {zh: '零', v: 0, p: 'líng', z: 'ㄌㄧㄥˊ'}, {zh: '一', v: 1, p: 'yī', z: 'ㄧ'},
        {zh: '二', v: 2, p: 'èr', z: 'ㄦˋ'}, {zh: '三', v: 3, p: 'sān', z: 'ㄙㄢ'},
        {zh: '四', v: 4, p: 'sì', z: 'ㄙˋ'}, {zh: '五', v: 5, p: 'wǔ', z: 'ㄨˇ'},
        {zh: '六', v: 6, p: 'liù', z: 'ㄌㄧㄡˋ'}, {zh: '七', v: 7, p: 'qī', z: 'ㄑㄧ'},
        {zh: '八', v: 8, p: 'bā', z: 'ㄅㄚ'}, {zh: '九', v: 9, p: 'jiǔ', z: 'ㄐㄧㄡˇ'}
    ];

    let gameState = {
        name: "",
        lives: 3,
        collected: new Set(),
        currentNum: "",
        dialed: "",
        targetRole: null
    };

    let audioCtx = null;
    let bgmNode = null;

    // --- 音效系統 ---
    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function playBGM() {
        if (bgmNode) return;
        const now = audioCtx.currentTime;
        bgmNode = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        bgmNode.type = 'triangle';
        bgmNode.frequency.setValueAtTime(440, now); // 簡單的和弦循環
        gain.gain.setValueAtTime(0.05, now);
        bgmNode.connect(gain);
        gain.connect(audioCtx.destination);
        bgmNode.start();
    }

    function stopBGM() {
        if (bgmNode) {
            bgmNode.stop();
            bgmNode = null;
        }
    }

    function beep(freq, dur) {
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.connect(g); g.connect(audioCtx.destination);
        osc.frequency.value = freq;
        g.gain.setValueAtTime(0.1, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
        osc.start(); osc.stop(audioCtx.currentTime + dur);
    }

    // --- 流程控制 ---
    function showScene(id) {
        document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function showConfig() {
        initAudio();
        playBGM();
        showScene('config-scene');
    }

    function setShell(color) {
        document.body.className = `case-${color}`;
    }

    function startStory() {
        gameState.name = document.getElementById('player-name').value || "小玩家";
        document.getElementById('story-text').innerText = `${gameState.name}，快幫幫我！我忘記帶手機了，你可以幫我打電話嗎？`;
        showScene('story-scene');
    }

    function initGame() {
        gameState.dialed = "";
        document.getElementById('dial-display').innerText = "";
        
        // 挑選未收集角色
        let pool = roles.filter(r => !gameState.collected.has(r.id));
        if (pool.length === 0) pool = roles;
        gameState.targetRole = pool[Math.floor(Math.random() * pool.length)];

        // 號碼生成
        if (gameState.targetRole.num) {
            gameState.currentNum = gameState.targetRole.num;
        } else {
            const len = Math.random() > 0.5 ? 8 : 10;
            gameState.currentNum = "";
            for(let i=0; i<len; i++) gameState.currentNum += Math.floor(Math.random()*10);
        }

        document.getElementById('role-icon').innerText = gameState.targetRole.i;
        document.getElementById('target-number').innerText = gameState.currentNum;
        document.getElementById('target-info').innerHTML = `
            打給 <div class="ruby"><span class="rt">${gameState.targetRole.zy}</span><b>${gameState.targetRole.n}</b></div>
        `;
        
        renderKeypad();
        updateUI();
        showScene('main-scene');
    }

    function renderKeypad() {
        const pad = document.getElementById('keypad');
        pad.innerHTML = "";
        let shuffled = [...numsChar].sort(() => Math.random() - 0.5);

        shuffled.slice(0, 9).forEach(n => pad.appendChild(createKey(n)));
        
        // 最後一排
        pad.appendChild(createActionKey("←", () => {
            gameState.dialed = gameState.dialed.slice(0, -1);
            document.getElementById('dial-display').innerText = gameState.dialed;
        }));
        pad.appendChild(createKey(shuffled[9]));
        pad.appendChild(createActionKey("📞", handleCall));
    }

    function createKey(item) {
        const d = document.createElement('div');
        d.className = 'key';
        d.innerHTML = `<span class="key-zh">${item.zh}</span><span class="key-py">${item.z}</span>`;
        d.onclick = () => {
            if(gameState.dialed.length < 12) {
                gameState.dialed += item.v;
                document.getElementById('dial-display').innerText = gameState.dialed;
                speak(item.zh);
            }
        };
        return d;
    }

    function createActionKey(label, cb) {
        const d = document.createElement('div');
        d.className = 'key';
        d.style.background = label === "📞" ? "#81c784" : "#ffab91";
        d.innerHTML = `<span class="key-zh">${label}</span>`;
        d.onclick = cb;
        return d;
    }

    function handleCall() {
        if (!gameState.dialed) return;
        stopBGM(); // 撥號時音樂暫停
        showScene('calling-scene');

        let count = 0;
        const interval = setInterval(() => {
            beep(440, 0.5);
            count++;
            if (count >= 3) {
                clearInterval(interval);
                finishCall();
            }
        }, 1000);
    }

    function finishCall() {
        const isSuccess = gameState.dialed === gameState.currentNum;
        showScene('result-scene');
        const icon = document.getElementById('result-icon');
        const msg = document.getElementById('result-msg');
        const nextBtn = document.getElementById('next-btn');
        const retryBtn = document.getElementById('retry-btn');

        if (isSuccess) {
            icon.innerText = "🎉";
            msg.innerText = "成功接通！\n「喂，你好！」";
            gameState.collected.add(gameState.targetRole.id);
            speak("喂，你好");
            nextBtn.style.display = "block";
            retryBtn.style.display = "none";
        } else {
            icon.innerText = "🚫";
            msg.innerText = "號碼錯誤...\n這不是我要找的人。";
            gameState.lives--;
            speak("您撥的號碼是空號");
            if (gameState.lives <= 0) {
                msg.innerText = "生命值用完了！\n下次再加油！";
                nextBtn.style.display = "none";
                retryBtn.style.display = "block";
            } else {
                nextBtn.style.display = "block";
                retryBtn.style.display = "none";
            }
        }
        updateUI();
        updateMedals();
        playBGM(); // 顯示結果後恢復音樂
    }

    function updateUI() {
        document.getElementById('life-box').innerText = "❤️".repeat(gameState.lives);
    }

    function updateMedals() {
        const list = document.getElementById('medal-list');
        list.innerHTML = "";
        roles.forEach(r => {
            const d = document.createElement('div');
            d.className = `medal ${gameState.collected.has(r.id) ? 'won' : ''}`;
            d.innerHTML = `<div style="font-size:2rem">${r.i}</div>${r.n}`;
            list.appendChild(d);
        });
    }

    function speak(txt) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(txt);
        u.lang = 'zh-TW';
        window.speechSynthesis.speak(u);
    }

    function toggleCollection() {
        const o = document.getElementById('collection-overlay');
        o.style.display = o.style.display === 'block' ? 'none' : 'block';
    }

    function resetGame() {
        gameState.lives = 3;
        gameState.collected = new Set();
        stopBGM();
        showScene('start-scene');
    }

    // 初始化調整
    window.onload = () => {
        updateMedals();
        setTimeout(() => {
            document.body.style.height = window.innerHeight + 'px';
        }, 100);
    };
</script>

</body>
</html>
